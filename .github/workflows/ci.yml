name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install workspace
        run: uv sync --all-packages --extra dev
      - name: Lint
        run: uv run ruff check packages/adaptorch-mcp
      - name: Typecheck
        run: uv run mypy packages/adaptorch-mcp/src
      - name: Test
        run: uv run pytest packages/adaptorch-mcp/tests -q
      - name: Doctor
        run: uv run adaptorch-mcp-doctor --json
      - name: Build package
        run: uv run python -m build packages/adaptorch-mcp

openapi: 3.1.0
info:
  title: AdaptOrch User API
  version: 1.0.0
  description: Public API used by the independent AdaptOrch SaaS CLI.
security:
  - tenantApiKey: []
  - bearerAuth: []
tags:
  - name: discovery
  - name: identity
  - name: runs
paths:
  /v1/capabilities:
    get:
      tags: [discovery]
      operationId: getCapabilities
      summary: Discover supported public API capabilities
      responses:
        "200":
          description: Supported capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitySet"
              example:
                api_version: v1
                run_types: [orchestration, patch_verification]
                features: [runs, evidence, artifacts]
        default:
          $ref: "#/components/responses/Error"
  /v1/whoami:
    get:
      tags: [identity]
      operationId: getCurrentPrincipal
      summary: Return the authenticated principal
      responses:
        "200":
          description: Authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
              example:
                subject_id: user-1
                project_id: project-1
        default:
          $ref: "#/components/responses/Error"
  /v1/runs:
    post:
      tags: [runs]
      operationId: createRun
      summary: Submit a run
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunSubmission"
            examples:
              orchestration:
                externalValue: "../examples/orchestration-run.json"
              patchVerification:
                externalValue: "../examples/patch-verification-run.json"
      responses:
        "201":
          description: Run admitted by the gateway
          headers:
            Location:
              description: Canonical URL for the run
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAdmission"
              example:
                ok: true
                run_id: run-1
                status: QUEUED
                topology: parallel
                origin: api
        default:
          $ref: "#/components/responses/Error"
    get:
      tags: [runs]
      operationId: listRuns
      summary: List runs visible to the authenticated principal
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RunStatus"
        - name: project_id
          in: query
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: Run page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunListResponse"
              example:
                items:
                  - run_id: run-1
                    kind: orchestration
                    status: SUCCEEDED
                    created_at: "2026-07-01T12:00:00Z"
                next_cursor: null
        default:
          $ref: "#/components/responses/Error"
  /v1/runs/{run_id}:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      tags: [runs]
      operationId: getRun
      summary: Get a run
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
              example:
                run_id: run-1
                kind: patch_verification
                status: RUNNING
                phase: verifying
                created_at: "2026-07-01T12:00:00Z"
                policy_version: "2026-07-01"
                links:
                  self: /v1/runs/run-1
                  evidence: /v1/runs/run-1/evidence
                  artifacts: /v1/runs/run-1/artifacts
        default:
          $ref: "#/components/responses/Error"
  /v1/runs/{run_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/RunId"
    put:
      tags: [runs]
      operationId: cancelRun
      summary: Request cancellation of a non-terminal run
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRunRequest"
            example:
              reason: stale request
      responses:
        "200":
          description: Cancellation confirmed locally
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAdmission"
              example:
                ok: true
                run_id: run-1
                status: FAILED
                error_class: CANCELLED
        "202":
          description: Cancellation propagation pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunAdmission"
              example:
                ok: true
                run_id: run-1
                status: CANCELLING
                cancel_state: pending
        default:
          $ref: "#/components/responses/Error"
  /v1/runs/{run_id}/evidence:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      tags: [runs]
      operationId: getRunEvidence
      summary: Get the evidence report for a run
      responses:
        "200":
          description: Run evidence report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceReport"
              example:
                run_id: run-1
                checks:
                  - name: tests
                    status: PASSED
        default:
          $ref: "#/components/responses/Error"
  /v1/runs/{run_id}/artifacts:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      tags: [runs]
      operationId: listRunArtifacts
      summary: List artifacts produced by a run
      responses:
        "200":
          description: Run artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactListResponse"
              example:
                run_id: run-1
                items:
                  - artifact_id: artifact-1
                    name: report.json
        default:
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    tenantApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        Tenant dashboard API key with the documented ado_ prefix. Send it only
        as X-API-Key; do not also send it in Authorization.
    bearerAuth:
      type: http
      scheme: bearer
      description: "Non-tenant service credential sent as Authorization: Bearer."
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Hyphenated UUID. Reusing a key with the same request returns the original result; reusing it with a different request returns a conflict.
      schema:
        type: string
        format: uuid
        pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        minLength: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    Error:
      description: Request failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    RunStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLING]
    RunKind:
      type: string
      enum: [orchestration, patch_verification]
    RunLinks:
      type: object
      description: >-
        Related resource URLs keyed by relation name
        (for example self, evidence, artifacts).
      additionalProperties:
        type: string
        minLength: 1
    RunSubmission:
      type: object
      additionalProperties: false
      required: [subtasks]
      properties:
        subtasks:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            additionalProperties: true
        dependencies:
          type: array
          items:
            type: object
            additionalProperties: true
        model:
          type: ["string", "null"]
        synthesis_mode:
          type: ["string", "null"]
        global_context:
          type: ["string", "null"]
    RunAdmission:
      type: object
      additionalProperties: true
      required: [ok, run_id, status]
      properties:
        ok:
          type: boolean
          const: true
        run_id:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/RunStatus"
    Run:
      type: object
      additionalProperties: false
      required: [run_id, status]
      properties:
        run_id:
          type: string
          minLength: 1
        kind:
          $ref: "#/components/schemas/RunKind"
        status:
          $ref: "#/components/schemas/RunStatus"
        phase:
          type: string
          minLength: 1
          description: Coarse execution phase reported while the run progresses.
        created_at:
          type: string
          format: date-time
        policy_version:
          type: string
          minLength: 1
          description: Version of the orchestration policy applied to the run.
        links:
          $ref: "#/components/schemas/RunLinks"
        project_id:
          type: string
          minLength: 1
    RunListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Run"
        next_cursor:
          type: ["string", "null"]
          description: Opaque cursor for the next page; null when no further page exists.
    CancelRunRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
    CapabilitySet:
      type: object
      additionalProperties: false
      required: [api_version, features]
      properties:
        api_version:
          type: string
          const: v1
        run_types:
          type: array
          items:
            $ref: "#/components/schemas/RunKind"
          uniqueItems: true
        features:
          type: array
          items:
            type: string
          uniqueItems: true
    Principal:
      type: object
      additionalProperties: false
      required: [subject_id]
      properties:
        subject_id:
          type: string
          minLength: 1
        project_id:
          type: string
          minLength: 1
    EvidenceCheck:
      type: object
      additionalProperties: false
      required: [name, status]
      properties:
        name:
          type: string
          minLength: 1
        status:
          type: string
          minLength: 1
          description: Outcome label for the check (for example PASSED or FAILED).
    EvidenceReport:
      type: object
      additionalProperties: false
      required: [run_id, checks]
      properties:
        run_id:
          type: string
          minLength: 1
        checks:
          type: array
          items:
            $ref: "#/components/schemas/EvidenceCheck"
    Artifact:
      type: object
      additionalProperties: false
      required: [artifact_id, name]
      properties:
        artifact_id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        media_type:
          type: string
        size_bytes:
          type: integer
          minimum: 0
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        download_url:
          type: string
          format: uri
          description: Short-lived URL for downloading the artifact.
    ArtifactListResponse:
      type: object
      additionalProperties: false
      required: [run_id, items]
      properties:
        run_id:
          type: string
          minLength: 1
        items:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string
    ApiError:
      type: object
      additionalProperties: false
      required: [code, message, request_id]
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ErrorDetail"
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ApiError"
